<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout cancelled — PDF Study Tool</title>
  <script>
    if (localStorage.getItem('theme') === 'dark')
      document.documentElement.setAttribute('data-theme', 'dark');
  </script>
  <style>
    :root {
      --bg: #f9fafb; --white: #ffffff; --text: #111827;
      --muted: #6b7280; --border: #e5e7eb;
      --accent: #4f46e5; --accent-dark: #4338ca; --accent-soft: #eef2ff;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --white: #1e293b; --text: #f1f5f9;
      --muted: #94a3b8; --border: #334155;
      --accent-soft: #1e1b4b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; margin: 0;
      transition: background-color 0.25s, color 0.25s;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 16px; padding: 2.5rem 2rem; max-width: 440px;
      text-align: center; transition: background-color 0.25s, border-color 0.25s;
    }
    .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: var(--muted); line-height: 1.55; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 1.5rem; margin: 0 0.25rem;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-dark); }
    .btn-ghost { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-ghost:hover { background: var(--accent-soft); }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">👋</div>
  <h1>Checkout cancelled</h1>
  <p>No worries — you weren't charged. You can keep using the free tier or upgrade anytime.</p>
  <a class="btn btn-primary" href="/pricing.html">See pricing</a>
  <a class="btn btn-ghost" href="/">Back to tool</a>
</div>
</body>
</html>
