<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout cancelled — PDF Study Tool</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb; color: #111827; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem; margin: 0;
    }
    .card {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 16px;
      padding: 2.5rem 2rem; max-width: 440px; text-align: center;
    }
    .icon { font-size: 3rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; line-height: 1.55; margin-bottom: 1.5rem; }
    .btn {
      display: inline-block; padding: 0.75rem 1.5rem; margin: 0 0.25rem;
      border-radius: 10px; font-size: 1rem; font-weight: 600;
      text-decoration: none; border: none; cursor: pointer;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-ghost { background: transparent; color: #4f46e5; border: 1.5px solid #4f46e5; }
    .btn-ghost:hover { background: #eef2ff; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">👋</div>
  <h1>Checkout cancelled</h1>
  <p>No worries — you weren't charged. You can keep using the free tier or upgrade anytime.</p>
  <a class="btn btn-primary" href="/pricing.html">See pricing</a>
  <a class="btn btn-ghost" href="/">Back to tool</a>
</div>
</body>
</html>
